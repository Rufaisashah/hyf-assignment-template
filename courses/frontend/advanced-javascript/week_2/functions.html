<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Callback Dashboard</title>
    <link rel="stylesheet" href="stylejs.css">
</head>
<body>

    <div class="main-container">
        <h1>JS Callback Exercises</h1>

        <div id="display-area">
            <p class="placeholder">Results will appear here...</p>
        </div>

        <div class="controls">
            
            <div class="button-group">
                <h3>Time Tasks</h3>
                <button id="delay-btn-5">Log after 5s</button>
                <button id="geo-btn">Log Location</button>
            </div>

            <div class="button-group">
                <h3>Custom Delay</h3>
                <div class="input-row">
                    <input type="number" id="user-delay" placeholder="Secs">
                    <button id="run-delay-btn">Start Timer</button>
                </div>
            </div>

            <div class="button-group">
                <h3>Joke Creator</h3>
                <button id="funny-btn">Funny Joke</button>
                <button id="bad-btn">Bad Joke</button>
            </div>

        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
