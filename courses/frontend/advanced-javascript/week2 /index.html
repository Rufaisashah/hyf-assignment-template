<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fastest Key Presser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>⚡ Fastest Presser Game</h1>

  <input type="number" id="timeInput" placeholder="Enter seconds">
  <button id="startBtn">Start Game</button>
  <button id="restartBtn">Restart</button>

  <p id="countdown"></p>

  
  <div class="players">
    <div class="player">
      <h2>Player S</h2>
      <p id="sCount">0</p>
      <button id="sBtn">Tap S</button> 
    </div>

    <div class="player">
      <h2>Player L</h2>
      <p id="lCount">0</p>
      <button id="lBtn">Tap L</button>
    </div>
  </div>

  <h2 id="result"></h2>
